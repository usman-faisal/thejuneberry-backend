services:
  postgres:
    image: postgres:16
    ports:
      - 5432:5432
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: medusa
    volumes:
      - medusa-postgres-data:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis
    ports:
      - 6379:6379
    volumes:
      - medusa-redis-data:/data
    restart: always

volumes:
  medusa-postgres-data:
  medusa-redis-data:
